<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Population Weighted Density Maps</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; background-color: #f4f4f4; }
        .container { width: 95%; margin: 20px auto; background-color: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; }
        .map-selector { text-align: center; margin-bottom: 20px; }
        label { margin-right: 10px; font-weight: bold; }
        select, button { padding: 10px; margin: 5px; border: 1px solid #ccc; border-radius: 4px; }
        #map-frame { width: 100%; height: 600px; border: 1px solid #ccc; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Population Weighted Density Maps</h1>
        <div class="map-selector">
            <label for="year-select">Select Year:</label>
            <select id="year-select">
                <!-- Options will be populated by JS -->
            </select>
        </div>
        <iframe id="map-frame" src=""></iframe>
    </div>

    <script>
        const mapBaseName = 'PWD_'; // Base name for map files
        const mapExtension = '_sub_national_100m_map.html'; // File extension for map files
        const mapDir = ''; // Maps are in the same directory as this HTML file
        const availableYears = ['2020', '2015', '2010', '2005', '2000']; // Sorted by recency
        const defaultYear = '2020';
        const iframe = document.getElementById('map-frame');
        const yearSelect = document.getElementById('year-select');

        function populateYears() {
            availableYears.forEach(year => {
                const option = document.createElement('option');
                option.value = year;
                option.textContent = year;
                yearSelect.appendChild(option);
            });
        }

        function loadMap(year) {
            const mapFileName = `${mapBaseName}${year}${mapExtension}`;
            // Construct the full path relative to this HTML file's location
            // Assuming this HTML file is in the same directory as the maps
            iframe.src = mapFileName; 
            yearSelect.value = year; // Update the dropdown to reflect the loaded map
        }

        yearSelect.addEventListener('change', (event) => {
            loadMap(event.target.value);
        });

        // Initialize by loading the default map
        document.addEventListener('DOMContentLoaded', () => {
            populateYears();
            loadMap(defaultYear);
        });
    </script>
</body>
</html>
