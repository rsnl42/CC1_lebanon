<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Education in Crisis — Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg: #0E1117; --surface: #161B27; --accent: #E07B3B; --text: #E8E6E0; --muted: #6B7A99;
        }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; }
        .insight-card { background: var(--surface); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="p-8">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-4xl font-bold mb-8 text-center text-orange-500 font-display">Education Crisis Dashboard</h1>
        
        <!-- Country Selector placeholder (linked to country_selector logic) -->
        <div id="selector-container" class="mb-12">
            <!-- This will be populated dynamically -->
        </div>

        <div id="insight-display" class="hidden grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="insight-card p-6 rounded-xl">
                <h3 class="text-xl font-bold text-orange-400 mb-2">Key Insight</h3>
                <p id="insight-text" class="text-gray-300"></p>
                <p class="text-xs text-gray-500 mt-4 italic" id="insight-reason"></p>
            </div>
            <div class="insight-card p-6 rounded-xl">
                <h3 class="text-xl font-bold text-blue-400 mb-2">Recommended Actions</h3>
                <p id="action-text" class="text-gray-300"></p>
                <p class="text-xs text-gray-500 mt-4 italic" id="action-reason"></p>
            </div>
        </div>
    </div>

    <script>
        let insightsData = {};
        
        async function loadInsights() {
            const resp = await fetch('country_strategic_insights.csv');
            const csv = await resp.text();
            const lines = csv.split('\n');
            lines.slice(1).forEach(line => {
                const [c, k, rk, p, rp] = line.split(',');
                if(c) insightsData[c] = {k, rk, p, rp};
            });
        }

        function showCountry(name) {
            const data = insightsData[name];
            if(data) {
                document.getElementById('insight-display').classList.remove('hidden');
                document.getElementById('insight-text').innerText = data.k;
                document.getElementById('insight-reason').innerText = data.rk;
                document.getElementById('action-text').innerText = data.p;
                document.getElementById('action-reason').innerText = data.rp;
            }
        }

        loadInsights();
    </script>
</body>
</html>
