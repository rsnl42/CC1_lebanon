<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conflict & Education Timeline Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; }
        #map { height: 100vh; width: 100%; }
        #loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .spinner {
            border: 8px solid #f3f3f3;
            border-top: 8px solid #3498db;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .control-panel {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(255, 255, 255, 0.9);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 80%;
            max-width: 600px;
        }
        .timeline-controls {
            display: flex;
            align-items: center;
            width: 100%;
            gap: 15px;
        }
        #year-slider { flex-grow: 1; }
        .data-toggle {
            margin-top: 10px;
            display: flex;
            gap: 20px;
        }
        .legend {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: white;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .legend-item { display: flex; align-items: center; margin-bottom: 5px; }
        .legend-color { width: 15px; height: 15px; border-radius: 50%; margin-right: 8px; }
        #current-year { font-weight: bold; font-size: 1.2em; min-width: 50px; text-align: center; }
        #play-button { 
            padding: 5px 15px; 
            cursor: pointer; 
            background: #007bff; 
            color: white; 
            border: none; 
            border-radius: 4px;
        }
        #play-button:hover { background: #0056b3; }
    </style>
</head>
<body>

<div id="loading-overlay">
    <div class="spinner"></div>
    <h2 style="margin-top: 20px;">Loading Data...</h2>
    <p>Processing conflict records and 100,000+ school markers</p>
</div>

<div id="map"></div>

<div class="legend">
    <h4>Legend</h4>
    <div class="legend-item">
        <div class="legend-color" style="background: rgba(255, 0, 0, 0.6); border: 1px solid red;"></div>
        <span id="legend-label">Conflict Events</span>
    </div>
    <div class="legend-item">
        <img src="https://cdn-icons-png.flaticon.com/512/167/167707.png" width="20" height="20" style="margin-right: 8px;">
        <span>Schools</span>
    </div>
</div>

<div class="control-panel">
    <div class="timeline-controls">
        <button id="play-button">Play</button>
        <div id="current-year">2000</div>
        <input type="range" id="year-slider" min="1997" max="2024" value="2000" step="1">
    </div>
    <div class="data-toggle">
        <label><input type="radio" name="dataType" value="Events" checked> Events</label>
        <label><input type="radio" name="dataType" value="Fatalities"> Fatalities</label>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<script>
    const map = L.map('map').setView([15, 20], 3);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    let conflictData = [];
    let schoolData = [];
    let conflictLayer = L.layerGroup().addTo(map);
    let schoolCluster = L.markerClusterGroup({
        chunkedLoading: true,
        maxClusterRadius: 50
    }).addTo(map);

    const yearSlider = document.getElementById('year-slider');
    const currentYearDisplay = document.getElementById('current-year');
    const playButton = document.getElementById('play-button');
    const dataTypeRadios = document.getElementsByName('dataType');
    const legendLabel = document.getElementById('legend-label');

    let isPlaying = false;
    let animationTimer;

    const schoolIcon = L.icon({
        iconUrl: 'https://cdn-icons-png.flaticon.com/512/167/167707.png',
        iconSize: [25, 25],
        iconAnchor: [12, 12],
        popupAnchor: [0, -10]
    });

    // Load Data
    Promise.all([
        fetch('data/conflict_data.csv').then(res => {
            if (!res.ok) throw new Error('Failed to load conflict data');
            return res.text();
        }),
        fetch('data/schools_data.csv').then(res => {
            if (!res.ok) throw new Error('Failed to load school data');
            return res.text();
        })
    ]).then(([conflictCsv, schoolCsv]) => {
        conflictData = Papa.parse(conflictCsv, { header: true, dynamicTyping: true, skipEmptyLines: true }).data;
        schoolData = Papa.parse(schoolCsv, { header: true, dynamicTyping: true, skipEmptyLines: true }).data;

        // Filter out rows with null lat/lon just in case
        conflictData = conflictData.filter(d => d.Latitude != null && d.Longitude != null);
        schoolData = schoolData.filter(d => d.latitude != null && d.longitude != null);

        // Populate slider range based on data
        const years = [...new Set(conflictData.map(d => d.Year))].filter(y => y).sort((a, b) => a - b);
        if (years.length > 0) {
            yearSlider.min = years[0];
            yearSlider.max = years[years.length - 1];
            yearSlider.value = years[0];
            currentYearDisplay.innerText = years[0];
        }

        addSchools();
        updateMap();
        document.getElementById('loading-overlay').style.display = 'none';
    }).catch(err => {
        console.error(err);
        alert('Error loading data: ' + err.message);
    });

    function addSchools() {
        schoolCluster.clearLayers();
        schoolData.forEach(school => {
            const marker = L.marker([school.latitude, school.longitude], { icon: schoolIcon });
            marker.bindPopup(`<b>School:</b> ${school.name || 'Unknown'}`);
            schoolCluster.addLayer(marker);
        });
    }

    function getRadius(value, type) {
        if (type === 'Events') {
            return Math.sqrt(value) * 2 + 3;
        } else {
            // Fatalities can be higher, use different scale
            return Math.sqrt(value) * 4 + 3;
        }
    }

    function updateMap() {
        const year = parseInt(yearSlider.value);
        const dataType = Array.from(dataTypeRadios).find(r => r.checked).value;
        currentYearDisplay.innerText = year;
        legendLabel.innerText = `Conflict ${dataType}`;

        conflictLayer.clearLayers();

        const filtered = conflictData.filter(d => d.Year === year && d[dataType] > 0);
        
        filtered.forEach(d => {
            const radius = getRadius(d[dataType], dataType);
            const marker = L.circleMarker([d.Latitude, d.Longitude], {
                radius: radius,
                fillColor: "red",
                color: "#900",
                weight: 1,
                opacity: 0.8,
                fillOpacity: 0.5
            });

            marker.bindPopup(`
                <div style="font-family: Arial, sans-serif;">
                    <b style="font-size: 1.1em;">${d.Country}</b><br>
                    <i>${d.Admin2} (${d.Admin1})</i><hr style="margin: 5px 0;">
                    <b>Year:</b> ${d.Year}<br>
                    <b>Events:</b> ${d.Events}<br>
                    <b>Fatalities:</b> ${d.Fatalities}
                </div>
            `);
            marker.addTo(conflictLayer);
        });
    }

    yearSlider.oninput = updateMap;
    dataTypeRadios.forEach(r => r.onchange = updateMap);

    playButton.onclick = () => {
        if (isPlaying) {
            pause();
        } else {
            play();
        }
    };

    function play() {
        isPlaying = true;
        playButton.innerText = "Pause";
        animationTimer = setInterval(() => {
            let nextYear = parseInt(yearSlider.value) + 1;
            if (nextYear > parseInt(yearSlider.max)) {
                nextYear = parseInt(yearSlider.min);
            }
            yearSlider.value = nextYear;
            updateMap();
        }, 1000);
    }

    function pause() {
        isPlaying = false;
        playButton.innerText = "Play";
        clearInterval(animationTimer);
    }

</script>

</body>
</html>
